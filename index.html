<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Socio">
<meta name="description" content="Tu asistente personal de confianza">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<title>Socio</title>
<style>
:root {
  --bg: #0f0f1a;
  --bg2: #16162a;
  --bg3: #1e1e35;
  --surface: #252540;
  --surface2: #2e2e50;
  --accent: #7c6af7;
  --accent2: #a594f9;
  --accent-dim: rgba(124,106,247,0.15);
  --green: #4ecb8d;
  --green-dim: rgba(78,203,141,0.15);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.12);
  --red: #f06b6b;
  --red-dim: rgba(240,107,107,0.12);
  --blue: #5eb8f5;
  --blue-dim: rgba(94,184,245,0.12);
  --text: #e8e8f0;
  --text2: #9090b0;
  --text3: #5a5a7a;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --radius: 16px;
  --radius-sm: 10px;
  --font-mono: 'Space Mono', monospace;
  --font: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: var(--font); color: var(--text); display: flex; flex-direction: column; }

/* HEADER */
#header {
  padding: 16px 20px 12px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
#logo {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(124,106,247,0.4);
}
#header-title { flex: 1; }
#header-title h1 { font-family: var(--font-mono); font-size: 17px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
#header-title p { font-size: 12px; color: var(--text2); margin-top: 1px; }
#status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); }
#status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* TABS */
#tabs {
  display: flex; padding: 10px 12px; gap: 6px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
#tabs::-webkit-scrollbar { display: none; }
.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; white-space: nowrap;
  border: 1px solid transparent; cursor: pointer;
  color: var(--text2); background: transparent;
  transition: all 0.2s; flex-shrink: 0;
}
.tab.active { background: var(--accent-dim); color: var(--accent2); border-color: rgba(124,106,247,0.25); }
.tab span { font-size: 15px; }

/* VIEWS */
#views { flex: 1; overflow: hidden; position: relative; }
.view { position: absolute; inset: 0; overflow-y: auto; display: none; padding-bottom: 100px; }
.view.active { display: block; }

/* CHAT VIEW */
#chat-view { display: none; flex-direction: column; }
#chat-view.active { display: flex; }
#messages { flex: 1; overflow-y: auto; padding: 16px 16px 0; display: flex; flex-direction: column; gap: 10px; }
.msg-wrap { display: flex; flex-direction: column; gap: 4px; }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.bot { align-items: flex-start; }
.msg {
  max-width: 82%; padding: 11px 15px; border-radius: 18px;
  font-size: 14px; line-height: 1.55; font-weight: 300;
}
.msg.user { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
.msg.bot { background: var(--surface); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border2); }
.msg.thinking { color: var(--text2); font-style: italic; }
.msg-time { font-size: 10px; color: var(--text3); padding: 0 6px; }
.suggestions { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
.sugg {
  padding: 6px 12px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border2); color: var(--text2);
  background: var(--bg3); cursor: pointer; transition: all 0.15s;
  font-family: var(--font);
}
.sugg:active { background: var(--surface); color: var(--text); }

#chat-input-area {
  padding: 12px 14px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-end; gap: 8px;
  flex-shrink: 0;
}
#chat-input {
  flex: 1; padding: 12px 16px; border-radius: 22px;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); font-size: 14px; font-family: var(--font); font-weight: 300;
  outline: none; resize: none; max-height: 120px; line-height: 1.4;
}
#chat-input::placeholder { color: var(--text3); }
#chat-input:focus { border-color: rgba(124,106,247,0.4); }
.icon-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s; font-size: 18px;
}
#send-btn { background: var(--accent); box-shadow: 0 4px 12px rgba(124,106,247,0.35); }
#send-btn:active { transform: scale(0.93); }
#send-btn:disabled { opacity: 0.35; box-shadow: none; }
#mic-btn { background: var(--surface); border: 1px solid var(--border2); }
#mic-btn.listening { background: var(--red); animation: mic-pulse 1s infinite; }
@keyframes mic-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(240,107,107,0.4); } 50% { box-shadow: 0 0 0 8px rgba(240,107,107,0); } }

/* LIST ITEMS */
.section-title {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3);
  padding: 20px 20px 10px;
}
.add-bar {
  display: flex; gap: 8px; padding: 0 16px 12px;
}
.add-input {
  flex: 1; padding: 10px 14px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); font-size: 14px; font-family: var(--font);
  outline: none;
}
.add-input::placeholder { color: var(--text3); }
.add-input:focus { border-color: rgba(124,106,247,0.4); }
.add-btn {
  padding: 10px 16px; border-radius: var(--radius-sm);
  background: var(--accent-dim); border: 1px solid rgba(124,106,247,0.25);
  color: var(--accent2); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--font); white-space: nowrap;
}
.add-btn:active { background: var(--accent); color: white; }
.items-list { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  transition: all 0.2s; cursor: pointer;
}
.list-item:active { background: var(--surface2); }
.list-item.done { opacity: 0.4; }
.item-circle {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--text3); display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.list-item.done .item-circle { background: var(--green); border-color: var(--green); }
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 400; color: var(--text); }
.list-item.done .item-name { text-decoration: line-through; color: var(--text3); }
.item-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.item-del {
  font-size: 16px; color: var(--text3); padding: 4px;
  background: none; border: none; cursor: pointer; line-height: 1;
}
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text3); font-size: 14px;
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.clear-bar { display: flex; justify-content: flex-end; padding: 0 16px 8px; }
.clear-done-btn {
  font-size: 12px; color: var(--text3); background: none; border: none;
  cursor: pointer; font-family: var(--font); padding: 4px 8px;
}
.clear-done-btn:active { color: var(--text2); }

/* AGENDA */
.agenda-date-group { margin-bottom: 8px; }
.date-label {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--accent2);
  padding: 16px 20px 8px; display: flex; align-items: center; gap: 8px;
}
.date-label.today::after { content: 'HOY'; font-size: 9px; background: var(--accent-dim); color: var(--accent2); padding: 2px 6px; border-radius: 4px; }
.event-item {
  margin: 0 16px 6px; padding: 12px 14px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px; cursor: pointer;
}
.event-time {
  font-family: var(--font-mono); font-size: 12px; color: var(--accent2);
  flex-shrink: 0; margin-top: 1px; min-width: 42px;
}
.event-body { flex: 1; }
.event-title { font-size: 14px; font-weight: 400; color: var(--text); }
.event-note { font-size: 12px; color: var(--text2); margin-top: 2px; }
.event-del { font-size: 16px; color: var(--text3); background: none; border: none; cursor: pointer; }

/* NOTES */
.note-item {
  margin: 6px 16px; padding: 14px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.2s;
}
.note-item:active { background: var(--surface2); }
.note-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.note-body { font-size: 13px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.note-date { font-size: 11px; color: var(--text3); margin-top: 8px; }
.note-editor {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg); display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.3s ease;
}
.note-editor.open { transform: translateY(0); }
.note-editor-header {
  padding: 16px 16px 12px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.back-btn {
  background: none; border: none; font-size: 22px; cursor: pointer;
  color: var(--text2); padding: 4px;
}
.note-title-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 17px; font-weight: 500; color: var(--text); font-family: var(--font);
}
.note-title-input::placeholder { color: var(--text3); }
.save-note-btn {
  padding: 8px 16px; border-radius: var(--radius-sm);
  background: var(--accent-dim); border: 1px solid rgba(124,106,247,0.25);
  color: var(--accent2); font-size: 13px; cursor: pointer; font-family: var(--font);
}
.note-body-input {
  flex: 1; padding: 16px; background: none; border: none; outline: none;
  font-size: 15px; color: var(--text); font-family: var(--font); font-weight: 300;
  resize: none; line-height: 1.65;
}
.note-body-input::placeholder { color: var(--text3); }

/* ADD EVENT MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50;
  display: flex; align-items: flex-end; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  width: 100%; background: var(--bg2); border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px;
  transform: translateY(40px); transition: transform 0.25s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal h3 { font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 18px; letter-spacing: -0.3px; }
.modal-field { margin-bottom: 14px; }
.modal-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
.modal-input {
  width: 100%; padding: 11px 14px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); font-size: 14px; font-family: var(--font); outline: none;
}
.modal-input:focus { border-color: rgba(124,106,247,0.4); }
.modal-row { display: flex; gap: 10px; }
.modal-row .modal-field { flex: 1; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-cancel {
  flex: 1; padding: 12px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); font-size: 14px; cursor: pointer; font-family: var(--font);
}
.modal-save {
  flex: 2; padding: 12px; border-radius: var(--radius-sm);
  background: var(--accent); border: none;
  color: white; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font);
}
.modal-save:active { opacity: 0.85; }

/* FAB */
.fab {
  position: fixed; bottom: 84px; right: 20px; z-index: 10;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; box-shadow: 0 6px 20px rgba(124,106,247,0.45);
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }

/* TOAST */
.toast {
  position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2); color: var(--text); padding: 10px 20px;
  border-radius: 20px; font-size: 13px; border: 1px solid var(--border2);
  opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MIC OVERLAY */
#mic-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
#mic-overlay.show { opacity: 1; pointer-events: all; }
#mic-wave {
  width: 100px; height: 100px; border-radius: 50%;
  background: var(--red); display: flex; align-items: center; justify-content: center;
  font-size: 40px; animation: mic-wave 1s infinite;
  box-shadow: 0 0 0 0 rgba(240,107,107,0.5);
}
@keyframes mic-wave {
  0% { box-shadow: 0 0 0 0 rgba(240,107,107,0.5); }
  70% { box-shadow: 0 0 0 30px rgba(240,107,107,0); }
  100% { box-shadow: 0 0 0 0 rgba(240,107,107,0); }
}
#mic-text { font-size: 16px; color: var(--text); }
#mic-interim { font-size: 14px; color: var(--text2); min-height: 20px; text-align: center; padding: 0 40px; }
#mic-cancel { padding: 12px 28px; border-radius: 22px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); font-size: 14px; cursor: pointer; font-family: var(--font); }

/* INSTALL BANNER */
#install-banner {
  display: none; padding: 12px 16px;
  background: var(--accent-dim); border-bottom: 1px solid rgba(124,106,247,0.2);
  align-items: center; gap: 10px;
}
#install-banner p { flex: 1; font-size: 13px; color: var(--text2); }
#install-banner p strong { color: var(--accent2); }
#install-btn-banner {
  padding: 8px 16px; border-radius: var(--radius-sm);
  background: var(--accent); border: none; color: white; font-size: 13px;
  cursor: pointer; font-family: var(--font); white-space: nowrap;
}
#dismiss-banner { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; }
</style>
</head>
<body>

<div id="install-banner">
  <p>📲 <strong>Instala Socio</strong> en tu teléfono</p>
  <button id="install-btn-banner">Instalar</button>
  <button id="dismiss-banner">✕</button>
</div>

<div id="header">
  <div id="logo">🤝</div>
  <div id="header-title">
    <h1>Socio</h1>
    <p>Tu asistente personal</p>
  </div>
  <div id="status"><div id="status-dot"></div><span>online</span></div>
</div>

<div id="tabs">
  <button class="tab active" data-view="chat"><span>💬</span> Chat</button>
  <button class="tab" data-view="compra"><span>🛒</span> Compra</button>
  <button class="tab" data-view="tareas"><span>✅</span> Tareas</button>
  <button class="tab" data-view="agenda"><span>📅</span> Agenda</button>
  <button class="tab" data-view="notas"><span>📝</span> Notas</button>
</div>

<div id="views">
  <!-- CHAT -->
  <div class="view active" id="chat-view" style="display:flex;flex-direction:column;">
    <div id="messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="Habla con Socio..." rows="1"></textarea>
      <button class="icon-btn" id="mic-btn" title="Voz">🎙️</button>
      <button class="icon-btn" id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M16 9L2 2.5l3.5 6.5-3.5 6.5L16 9z" fill="white"/></svg>
      </button>
    </div>
  </div>

  <!-- COMPRA -->
  <div class="view" id="compra-view">
    <div class="section-title">Lista de la compra</div>
    <div class="add-bar">
      <input class="add-input" id="compra-input" placeholder="Añadir producto...">
      <button class="add-btn" id="compra-add-btn">+ Añadir</button>
    </div>
    <div class="clear-bar">
      <button class="clear-done-btn" onclick="clearDone('compra')">Limpiar comprados ✓</button>
    </div>
    <div class="items-list" id="compra-list"></div>
  </div>

  <!-- TAREAS -->
  <div class="view" id="tareas-view">
    <div class="section-title">Tareas y recados</div>
    <div class="add-bar">
      <input class="add-input" id="tareas-input" placeholder="Nueva tarea...">
      <button class="add-btn" id="tareas-add-btn">+ Añadir</button>
    </div>
    <div class="clear-bar">
      <button class="clear-done-btn" onclick="clearDone('tareas')">Limpiar hechas ✓</button>
    </div>
    <div class="items-list" id="tareas-list"></div>
  </div>

  <!-- AGENDA -->
  <div class="view" id="agenda-view">
    <div class="section-title">Agenda</div>
    <div id="agenda-list"></div>
  </div>

  <!-- NOTAS -->
  <div class="view" id="notas-view">
    <div class="section-title">Notas rápidas</div>
    <div id="notas-list"></div>
  </div>
</div>

<!-- FAB para agenda/notas -->
<button class="fab" id="fab" style="display:none">+</button>

<!-- Modal añadir evento -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <h3>Nuevo evento</h3>
    <div class="modal-field">
      <label class="modal-label">Título</label>
      <input class="modal-input" id="ev-title" placeholder="Qué tienes">
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label class="modal-label">Fecha</label>
        <input class="modal-input" id="ev-date" type="date">
      </div>
      <div class="modal-field">
        <label class="modal-label">Hora</label>
        <input class="modal-input" id="ev-time" type="time">
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Nota (opcional)</label>
      <input class="modal-input" id="ev-note" placeholder="Detalles...">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modal-cancel">Cancelar</button>
      <button class="modal-save" id="modal-save">Guardar evento</button>
    </div>
  </div>
</div>

<!-- Note editor -->
<div class="note-editor" id="note-editor">
  <div class="note-editor-header">
    <button class="back-btn" id="note-back">←</button>
    <input class="note-title-input" id="note-title-input" placeholder="Título de la nota">
    <button class="save-note-btn" id="save-note-btn">Guardar</button>
  </div>
  <textarea class="note-body-input" id="note-body-input" placeholder="Escribe aquí..."></textarea>
</div>

<!-- Mic overlay -->
<div id="mic-overlay">
  <div id="mic-wave">🎙️</div>
  <div id="mic-text">Escuchando...</div>
  <div id="mic-interim"></div>
  <button id="mic-cancel">Cancelar</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ====== ESTADO & PERSISTENCIA ======
const DB_KEY = 'socio_v2';
let state = {
  compra: [], tareas: [], agenda: [], notas: [],
  chat: []
};

function save() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem(DB_KEY);
    if (d) state = { ...state, ...JSON.parse(d) };
  } catch(e) {}
}
load();

// ====== TOAST ======
function toast(msg, dur=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ====== TABS ======
let currentTab = 'chat';
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const view = document.getElementById(currentTab + '-view');
    if (view) view.classList.add('active');
    const fab = document.getElementById('fab');
    fab.style.display = (currentTab === 'agenda' || currentTab === 'notas') ? 'flex' : 'none';
    if (currentTab === 'compra') renderList('compra');
    if (currentTab === 'tareas') renderList('tareas');
    if (currentTab === 'agenda') renderAgenda();
    if (currentTab === 'notas') renderNotas();
  });
});

// ====== LISTAS (COMPRA + TAREAS) ======
function renderList(type) {
  const list = state[type];
  const el = document.getElementById(type + '-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">${type==='compra'?'🛒':'✅'}</div><p>Sin ${type==='compra'?'productos':'tareas'} por ahora</p></div>`;
    return;
  }
  el.innerHTML = list.map((item, i) => `
    <div class="list-item ${item.done?'done':''}" onclick="toggleItem('${type}',${i})">
      <div class="item-circle">
        ${item.done ? '<svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5L9 3" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
      </div>
      <div class="item-body">
        <div class="item-name">${esc(item.name)}</div>
        ${item.qty ? `<div class="item-sub">${esc(item.qty)}</div>` : ''}
      </div>
      <button class="item-del" onclick="event.stopPropagation();delItem('${type}',${i})">✕</button>
    </div>
  `).join('');
}

function toggleItem(type, i) {
  state[type][i].done = !state[type][i].done;
  save(); renderList(type);
}
function delItem(type, i) {
  state[type].splice(i, 1);
  save(); renderList(type);
}
function clearDone(type) {
  state[type] = state[type].filter(x => !x.done);
  save(); renderList(type); toast('Listo ✓');
}
function addItem(type, name, qty='') {
  if (!name.trim()) return false;
  const n = name.trim().toLowerCase();
  if (state[type].find(x => x.name === n)) { toast('Ya está en la lista'); return false; }
  state[type].push({ name: n, qty, done: false });
  save(); renderList(type); return true;
}

document.getElementById('compra-add-btn').onclick = () => {
  const inp = document.getElementById('compra-input');
  if (addItem('compra', inp.value)) { inp.value = ''; toast('Añadido 🛒'); }
};
document.getElementById('compra-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('compra-add-btn').click();
});
document.getElementById('tareas-add-btn').onclick = () => {
  const inp = document.getElementById('tareas-input');
  if (addItem('tareas', inp.value)) { inp.value = ''; toast('Tarea añadida ✅'); }
};
document.getElementById('tareas-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('tareas-add-btn').click();
});

// ====== AGENDA ======
function renderAgenda() {
  const el = document.getElementById('agenda-list');
  if (!state.agenda.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>Sin eventos. ¡Añade uno!</p></div>';
    return;
  }
  const sorted = [...state.agenda].sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  const today = new Date().toISOString().slice(0,10);
  const groups = {};
  sorted.forEach(ev => {
    if (!groups[ev.date]) groups[ev.date] = [];
    groups[ev.date].push(ev);
  });
  el.innerHTML = Object.entries(groups).map(([date, evs]) => {
    const d = new Date(date + 'T12:00:00');
    const label = d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
    const isToday = date === today;
    return `
      <div class="agenda-date-group">
        <div class="date-label${isToday?' today':''}">${label}</div>
        ${evs.map(ev => `
          <div class="event-item">
            <div class="event-time">${ev.time || '—'}</div>
            <div class="event-body">
              <div class="event-title">${esc(ev.title)}</div>
              ${ev.note ? `<div class="event-note">${esc(ev.note)}</div>` : ''}
            </div>
            <button class="event-del" onclick="delEvent('${ev.id}')">✕</button>
          </div>
        `).join('')}
      </div>`;
  }).join('');
}

function delEvent(id) {
  state.agenda = state.agenda.filter(e => e.id !== id);
  save(); renderAgenda();
}
function addEvent(title, date, time, note='') {
  if (!title.trim() || !date) return false;
  state.agenda.push({ id: Date.now().toString(), title: title.trim(), date, time, note });
  save(); renderAgenda(); return true;
}

// Modal evento
const modal = document.getElementById('event-modal');
document.getElementById('fab').onclick = () => {
  if (currentTab === 'agenda') {
    document.getElementById('ev-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('ev-title').value = '';
    document.getElementById('ev-time').value = '';
    document.getElementById('ev-note').value = '';
    modal.classList.add('open');
  } else if (currentTab === 'notas') {
    openNoteEditor(-1);
  }
};
document.getElementById('modal-cancel').onclick = () => modal.classList.remove('open');
document.getElementById('modal-save').onclick = () => {
  const ok = addEvent(
    document.getElementById('ev-title').value,
    document.getElementById('ev-date').value,
    document.getElementById('ev-time').value,
    document.getElementById('ev-note').value
  );
  if (ok) { modal.classList.remove('open'); toast('Evento guardado 📅'); }
};

// ====== NOTAS ======
let editingNoteIdx = -1;
function renderNotas() {
  const el = document.getElementById('notas-list');
  if (!state.notas.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>Sin notas. ¡Escribe algo!</p></div>';
    return;
  }
  el.innerHTML = [...state.notas].reverse().map((nota, ri) => {
    const i = state.notas.length - 1 - ri;
    return `
      <div class="note-item" onclick="openNoteEditor(${i})">
        <div class="note-title">${esc(nota.title) || 'Sin título'}</div>
        <div class="note-body">${esc(nota.body)}</div>
        <div class="note-date">${nota.date}</div>
      </div>`;
  }).join('');
}
function openNoteEditor(i) {
  editingNoteIdx = i;
  const editor = document.getElementById('note-editor');
  if (i === -1) {
    document.getElementById('note-title-input').value = '';
    document.getElementById('note-body-input').value = '';
  } else {
    document.getElementById('note-title-input').value = state.notas[i].title;
    document.getElementById('note-body-input').value = state.notas[i].body;
  }
  editor.classList.add('open');
}
document.getElementById('note-back').onclick = () => document.getElementById('note-editor').classList.remove('open');
document.getElementById('save-note-btn').onclick = () => {
  const title = document.getElementById('note-title-input').value;
  const body = document.getElementById('note-body-input').value;
  if (!title.trim() && !body.trim()) { toast('La nota está vacía'); return; }
  const nota = { title: title.trim(), body: body.trim(), date: new Date().toLocaleDateString('es-ES') };
  if (editingNoteIdx === -1) { state.notas.push(nota); }
  else { state.notas[editingNoteIdx] = nota; }
  save(); renderNotas();
  document.getElementById('note-editor').classList.remove('open');
  toast('Nota guardada 📝');
};

// ====== CHAT / IA ======
const SYSTEM_PROMPT = `Eres "Socio", un asistente personal amigable que habla en español informal de España. Tienes acceso a las listas del usuario y puedes gestionarlas.

SIEMPRE responde SOLO con un JSON válido sin markdown ni backticks. Formato exacto:
{"action":"...", "target":"...", "items":[], "event":{}, "note":{}, "message":"..."}

ACCIONES disponibles:
- "add_compra": añadir a lista de la compra. items=["nombre"]
- "add_tarea": añadir tarea. items=["nombre"]  
- "add_event": añadir evento. event={"title":"","date":"YYYY-MM-DD","time":"HH:MM","note":""}
- "add_nota": añadir nota. note={"title":"","body":""}
- "remove_compra": quitar de compra. items=["nombre"]
- "remove_tarea": quitar tarea. items=["nombre"]
- "done_compra": marcar comprado. items=["nombre"]
- "done_tarea": marcar tarea hecha. items=["nombre"]
- "clear_compra": limpiar lista de la compra
- "show_compra": mostrar lista de la compra
- "show_tareas": mostrar tareas
- "show_agenda": mostrar agenda
- "none": solo conversación

El campo "message" es tu respuesta en texto, breve y en español coloquial español. Usa "venga", "dale", "genial", etc.
Hoy es: ${new Date().toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}.
Fecha ISO hoy: ${new Date().toISOString().slice(0,10)}.`;

function getContext() {
  const fmt = (arr) => arr.length ? arr.map(x=>(x.done?'[✓] ':'')+x.name).join(', ') : 'vacía';
  const evts = state.agenda.length ? state.agenda.slice(0,5).map(e=>`${e.date} ${e.time} - ${e.title}`).join('; ') : 'sin eventos';
  return `\n\n[ESTADO ACTUAL]\nCompra: ${fmt(state.compra)}\nTareas: ${fmt(state.tareas)}\nAgenda (próximos): ${evts}`;
}

let chatHistory = [];
function addMsg(text, role, thinking=false) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `msg ${role}${thinking?' thinking':''}`;
  bubble.textContent = text;
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
  wrap.appendChild(bubble);
  if (!thinking) wrap.appendChild(time);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}
function addSuggs(suggs) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'suggestions';
  suggs.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sugg';
    btn.textContent = s;
    btn.onclick = () => { document.getElementById('chat-input').value = s; sendChat(); };
    div.appendChild(btn);
  });
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  wrap.appendChild(div);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMsg(text, 'user');
  chatHistory.push({ role:'user', content: text + getContext() });
  const thinking = addMsg('...', 'bot', true);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: chatHistory.slice(-12)
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || '{"action":"none","message":"No te he entendido, tío. Inténtalo de nuevo."}';
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
    catch { parsed = { action:'none', message: raw }; }

    processAction(parsed);
    thinking.parentElement.remove();
    addMsg(parsed.message || '¿Qué me decías?', 'bot');
    chatHistory.push({ role:'assistant', content: raw });

    if (chatHistory.length <= 2) {
      addSuggs(['Apunta mantequilla', 'Añade leche y pan', 'Pon cita médica mañana a las 10', '¿Qué tengo pendiente?']);
    }
  } catch(e) {
    thinking.parentElement.remove();
    addMsg('Uy, algo ha fallado. Comprueba la conexión.', 'bot');
  }
  document.getElementById('send-btn').disabled = false;
}

function processAction(p) {
  const { action, items=[], event={}, note={} } = p;
  if (action === 'add_compra') { items.forEach(n => addItemSilent('compra', n)); if(currentTab==='compra') renderList('compra'); }
  else if (action === 'add_tarea') { items.forEach(n => addItemSilent('tareas', n)); if(currentTab==='tareas') renderList('tareas'); }
  else if (action === 'remove_compra') { removeItem('compra', items); }
  else if (action === 'remove_tarea') { removeItem('tareas', items); }
  else if (action === 'done_compra') { doneItem('compra', items); }
  else if (action === 'done_tarea') { doneItem('tareas', items); }
  else if (action === 'clear_compra') { state.compra=[]; save(); if(currentTab==='compra') renderList('compra'); }
  else if (action === 'add_event' && event.title) {
    addEvent(event.title, event.date || new Date().toISOString().slice(0,10), event.time || '', event.note || '');
  }
  else if (action === 'add_nota' && (note.title || note.body)) {
    state.notas.push({ title: note.title||'', body: note.body||'', date: new Date().toLocaleDateString('es-ES') });
    save(); if(currentTab==='notas') renderNotas();
  }
}
function addItemSilent(type, name) {
  const n = name.trim().toLowerCase();
  if (!n || state[type].find(x=>x.name===n)) return;
  state[type].push({ name:n, done:false }); save();
}
function removeItem(type, items) {
  items.forEach(name => {
    const n = name.toLowerCase().trim();
    state[type] = state[type].filter(x => !x.name.includes(n));
  });
  save(); if(currentTab===type) renderList(type);
}
function doneItem(type, items) {
  items.forEach(name => {
    const n = name.toLowerCase().trim();
    const it = state[type].find(x => x.name.includes(n));
    if (it) it.done = true;
  });
  save(); if(currentTab===type) renderList(type);
}

// Auto-resize textarea
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = !chatInput.value.trim();
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
document.getElementById('send-btn').onclick = sendChat;

// ====== VOZ ======
let recognition = null;
let isListening = false;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onresult = (e) => {
    const interim = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('mic-interim').textContent = interim;
    if (e.results[e.results.length-1].isFinal) {
      stopListening();
      chatInput.value = interim;
      document.getElementById('send-btn').disabled = false;
      sendChat();
    }
  };
  recognition.onerror = () => stopListening();
  recognition.onend = () => { if(isListening) stopListening(); };
} else {
  document.getElementById('mic-btn').style.opacity = '0.3';
  document.getElementById('mic-btn').title = 'Voz no disponible en este navegador';
}

function startListening() {
  if (!recognition) { toast('Voz no disponible en este navegador'); return; }
  isListening = true;
  document.getElementById('mic-overlay').classList.add('show');
  document.getElementById('mic-interim').textContent = '';
  recognition.start();
}
function stopListening() {
  isListening = false;
  document.getElementById('mic-overlay').classList.remove('show');
  try { recognition.stop(); } catch(e) {}
}
document.getElementById('mic-btn').onclick = () => isListening ? stopListening() : startListening();
document.getElementById('mic-cancel').onclick = stopListening;

// ====== PWA INSTALL ======
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  banner.style.display = 'flex';
});
document.getElementById('install-btn-banner').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
  if (outcome === 'accepted') toast('¡Socio instalado! 🎉');
};
document.getElementById('dismiss-banner').onclick = () => {
  document.getElementById('install-banner').style.display = 'none';
};

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
